name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: acrcbtwbooks.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          cd backend
          docker build -t acrcbtwbooks.azurecr.io/find-that-book-api:${{ github.sha }} -t acrcbtwbooks.azurecr.io/find-that-book-api:latest .
          docker push acrcbtwbooks.azurecr.io/find-that-book-api:${{ github.sha }}
          docker push acrcbtwbooks.azurecr.io/find-that-book-api:latest

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: GR-CBTW-CHALLENGUE
          containerAppName: ca-cbtw-books-api
          imageToDeploy: acrcbtwbooks.azurecr.io/find-that-book-api:${{ github.sha }}
          registryUrl: acrcbtwbooks.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}